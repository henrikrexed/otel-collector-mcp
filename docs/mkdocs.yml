site_name: otel-collector-mcp
site_description: MCP server for OpenTelemetry Collector troubleshooting and design guidance
site_url: https://hrexed.github.io/otel-collector-mcp
repo_url: https://github.com/hrexed/otel-collector-mcp
repo_name: hrexed/otel-collector-mcp

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tools Reference:
    - v1 Tools: tools/index.md
    - v2 Tools: tools/v2-tools.md
  - Skills Reference: skills/index.md
  - Architecture Guide: architecture/index.md
  - v2 Features:
    - Getting Started with v2: guides/getting-started-v2.md
    - Safety Model: guides/safety-model.md
    - Detection Rules: guides/detection-rules.md
    - Use Cases: guides/use-cases.md
    - Migration Guide: v2/migration.md
  - Integrations:
    - Claude (Desktop & CLI): integrations/claude.md
    - GitHub Copilot: integrations/github-copilot.md
    - VS Code: integrations/vscode.md
    - kagent: integrations/kagent.md
    - HolmesGPT: integrations/holmesgpt.md
    - Sympozium: integrations/sympozium.md
  - Observability: observability.md
  - Contributing: contributing.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - toc:
      permalink: true
